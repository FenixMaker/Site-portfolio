[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"

[[headers]]
for = "/*"
values.X-Frame-Options = "DENY"
values.X-Content-Type-Options = "nosniff"
values.X-XSS-Protection = "1; mode=block"
values.Referrer-Policy = "strict-origin-when-cross-origin"
values.Permissions-Policy = "geolocation=(), microphone=(), camera=()"
values.Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
values.Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
values.Cross-Origin-Opener-Policy = "same-origin"
values.Cross-Origin-Embedder-Policy = "require-corp"

[[headers]]
for = "/robots.txt"
values.Content-Type = "text/plain; charset=utf-8"
values.Cache-Control = "public, max-age=3600"

[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
